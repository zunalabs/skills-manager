<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1917"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="224" ry="224"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Bar 1 (top) -->
  <rect x="248" y="310" width="340" height="60" rx="30" fill="url(#glyph)"/>

  <!-- Bar 2 (middle) -->
  <rect x="248" y="422" width="260" height="60" rx="30" fill="url(#glyph)" opacity="0.75"/>

  <!-- Bar 3 (bottom) -->
  <rect x="248" y="534" width="300" height="60" rx="30" fill="url(#glyph)" opacity="0.55"/>

  <!-- Spark / bolt -->
  <path
    d="M 680 290 L 610 490 L 670 490 L 600 730 L 760 460 L 690 460 L 756 290 Z"
    fill="url(#glyph)"
  />
</svg>
